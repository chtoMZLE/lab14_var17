apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pcap-collector-hpa
  namespace: lab14
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pcap-collector
  minReplicas: 1
  maxReplicas: 5
  metrics:
    # Масштабируем по CPU: >60% → добавляем реплику
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    # Масштабируем по памяти: >70% → добавляем реплику
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
